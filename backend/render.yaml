services:
  - type: web
    name: rrgsoft-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rrgsoft-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://rrgsoft-portfolio.vercel.app

databases:
  - name: rrgsoft-db
    region: frankfurt
    plan: free
    databaseName: rrgsoft
    user: rrgsoft
